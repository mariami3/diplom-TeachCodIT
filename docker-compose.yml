version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: teachcodit-db
    environment:
      SA_PASSWORD: YourStrong@Passw0rd123
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd123", "-Q", "SELECT 1"]
      interval: 10s
      retries: 25
      start_period: 40s
      timeout: 10s

  api:
    build:
      context: .
      dockerfile: TeachCodIT-API/TeachCodIT-API/Dockerfile
    container_name: teachcodit-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TeachCodIt;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5066:8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: TeachCodIT/TeachCodIT/Dockerfile
    container_name: teachcodit-web
    depends_on:
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TeachCodIt;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5000:8080"
    restart: unless-stopped

volumes:
  mssql_data: